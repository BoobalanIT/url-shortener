<div class="auth-page">
  <div class="auth-card">

    <div class="brand">snip<span>ly</span></div>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to manage your short links</p>

    <div class="error-box" *ngIf="error">{{ error }}</div>

    <form (ngSubmit)="onSubmit()">
      <div class="field">
        <label>Email</label>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="you@example.com"
          required
        />
      </div>

      <div class="field">
        <label>Password</label>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          required
        />
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading">
        {{ loading ? 'Signing in...' : 'Sign in' }}
      </button>
    </form>

    <p class="auth-link">
      Don't have an account?
      <a routerLink="/register">Create one</a>
    </p>

  </div>
</div>

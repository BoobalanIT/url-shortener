<div class="auth-page">
  <div class="auth-card">

    <div class="brand">snip<span>ly</span></div>
    <h1 class="auth-title">Create account</h1>
    <p class="auth-sub">Start shortening your links today</p>

    <div class="error-box" *ngIf="error">{{ error }}</div>

    <form (ngSubmit)="onSubmit()">
      <div class="field">
        <label>Name</label>
        <input
          type="text"
          [(ngModel)]="name"
          name="name"
          placeholder="John Doe"
          required
        />
      </div>

      <div class="field">
        <label>Email</label>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="you@example.com"
          required
        />
      </div>

      <div class="field">
        <label>Password</label>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Min 6 characters"
          required
        />
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading">
        {{ loading ? 'Creating account...' : 'Create account' }}
      </button>
    </form>

    <p class="auth-link">
      Already have an account?
      <a routerLink="/login">Sign in</a>
    </p>

  </div>
</div>
